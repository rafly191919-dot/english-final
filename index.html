<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SpeakMind</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Test Your Speaking Mindset</h1>
  <p>Find out why you are not fluent yet.</p>

  <div id="quiz">
    <h2 id="question"></h2>
    <div id="answers"></div>
    <button id="nextBtn">Next</button>
  </div>

  <div id="result" class="hidden">
    <h2>Your Result</h2>
    <p id="resultText"></p>
    <button onclick="restart()">Restart</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
